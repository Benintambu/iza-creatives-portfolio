    <main>
        <section class="section contact">
            <div class="contact-header">
                <h1>Parlons de votre <br>prochain projet.</h1>

            <div class="contact-content">
                <div class="contact-infos">
                    <div class="contact-info-item">
                        <span>email</span>
                        <p><a href="mailto:israeliza230@gmail.com">israeliza230@gmail.com</a></p>
                    </div>

                    <div class="contact-info-item">
                        <span>téléphone</span>
                        <p><a href="tel:+243830831139">+243 830 831 139</a></p>
                    </div>

                    <div class="contact-info-item contact-info-socials">
                        <span>réseaux sociaux</span>
                        <div class="socials-icons">
                            <a href="https://www.instagram.com/iza_photogarphy?igsh=OTliMm04Z3YwYmw0" target="_blank"
                                rel="noopener noreferrer" title="Suivez-nous sur Instagram">

                                rel="noopener noreferrer" title="Découvrez nos vidéos TikTok">

                    </div>
                </div>

                <form class="contact-form" action="#" method="POST">
                    <input type="text" name="name" placeholder="Nom complet" id="name" aria-label="Nom complet"
                        required>
                    <input type="email" name="email" placeholder="Email" id="email" aria-label="Adresse email" required>
                    <input type="text" name="object" placeholder="Objet de l'email" id="object"
                        aria-label="Objet du message">
                    <textarea name="message" id="message" placeholder="Votre message" aria-label="Votre message"
                        required></textarea>

                    <div class="contact-form-button">
                        <button type="submit" class="button">envoyer</button>
                    </div>
                </form>
            </div>
